<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área 037 | Streetwear</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #000; --green: #1b5e20; --white: #fff; --accent: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--white); overflow-x: hidden; }
        
        header { position: fixed; top: 0; width: 100%; height: 75px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; z-index: 1000; border-bottom: 1px solid #eee; }
        .icon-btn { font-size: 1.2rem; cursor: pointer; transition: 0.2s; position: relative; }

        .search-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: none; align-items: center; padding: 0 5%;
            z-index: 1100;
        }
        .search-container.active { display: flex; }
        .search-container input {
            flex: 1; border: none; outline: none; font-size: 1.2rem; font-weight: 700;
            text-transform: uppercase;
        }
        .close-search { font-size: 1.5rem; cursor: pointer; margin-left: 15px; }

        .london-hero { 
            width: 100%; height: 80vh; margin-top: 75px;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1529655683826-aba9b3e77383?q=80&w=1600') center/cover;
            display: flex; align-items: center; justify-content: center;
        }
        .london-hero img { width: 70%; max-width: 400px; filter: drop-shadow(0 0 20px rgba(0,0,0,0.5)); }

        .carousel-container { width: 100%; height: 350px; overflow: hidden; position: relative; background: #000; margin: 40px 0; }
        .carousel-track { display: flex; transition: 0.6s cubic-bezier(0.45, 0, 0.55, 1); height: 100%; }
        .carousel-track img { width: 100%; min-width: 100%; object-fit: cover; }

        .section-container { padding: 40px 5%; min-height: 50vh; }
        .brand-title { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; border-left: 6px solid #000; padding-left: 15px; margin-top: 40px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 40px; }
        @media(min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } }
        
        .p-card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #eee; cursor: pointer; transition: 0.3s; }
        .p-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .p-price { color: var(--green); font-weight: 900; font-size: 1.1rem; margin-top: 5px; }

        .sidebar { position: fixed; top: 0; width: 320px; height: 100%; background: #fff; z-index: 5000; transition: 0.4s; padding: 35px; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        #filterSide { left: -320px; }
        #filterSide.active { left: 0; }
        #cartSide { right: -320px; }
        #cartSide.active { right: 0; }
        .filter-link { display: block; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; cursor: pointer; }
        .close-btn { width: 100%; padding: 12px; background: #000; color: #fff; border: none; font-weight: 900; cursor: pointer; margin-bottom: 25px; }

        .cart-item { display: flex; gap: 12px; margin-bottom: 15px; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .cart-item img { width: 65px; height: 65px; object-fit: cover; border-radius: 8px; background: #f9f9f9; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 6000; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 850px; border-radius: 20px; overflow: hidden; display: grid; grid-template-columns: 1fr 1fr; position: relative; }
        @media (max-width: 768px) { .modal-content { grid-template-columns: 1fr; max-height: 90vh; overflow-y: auto; } }
        .size-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .size-btn { padding: 10px; border: 1px solid #ddd; text-align: center; cursor: pointer; font-weight: 700; border-radius: 6px; }
        .size-btn.selected { background: #000; color: #fff; border-color: #000; }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-bars icon-btn" onclick="toggleSidebar('filterSide')"></i>
        <img src="logo.jpg" style="height:35px; cursor:pointer" onclick="window.location.reload()">
        <div style="display:flex; gap:20px">
            <i class="fas fa-search icon-btn" onclick="toggleSearch()"></i>
            <div class="icon-btn" onclick="toggleSidebar('cartSide')">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartCount" style="position:absolute; top:-8px; right:-8px; background:red; color:white; font-size:0.6rem; padding:2px 5px; border-radius:50%;">0</span>
            </div>
        </div>
        <div class="search-container" id="searchBar">
            <input type="text" id="searchInput" placeholder="BUSCAR PRODUTO..." oninput="realTimeSearch()">
            <i class="fas fa-times close-search" onclick="toggleSearch()"></i>
        </div>
    </header>

    <div id="filterSide" class="sidebar">
        <button class="close-btn" onclick="toggleSidebar('filterSide')">FECHAR MENU</button>
        <h2>MARCAS</h2><br>
        <span class="filter-link" onclick="filterBy('NIKE')">Nike</span>
        <span class="filter-link" onclick="filterBy('ADIDAS')">Adidas</span>
        <span class="filter-link" onclick="filterBy('NEW BALANCE')">New Balance</span>
        <span class="filter-link" onclick="filterBy('PUMA')">Puma</span>
        <span class="filter-link" onclick="filterBy('ALL')" style="color:var(--accent)">Ver Tudo</span>
    </div>

    <div id="cartSide" class="sidebar">
        <button class="close-btn" onclick="toggleSidebar('cartSide')">FECHAR CARRINHO</button>
        <h2 style="margin-bottom:20px">SEU CARRINHO</h2>
        <div id="cartItems"></div>
        <div style="margin-top:20px; border-top:2px solid #eee; padding-top:20px">
            <h3 id="cartTotal">Total: R$ 0,00</h3>
            <button onclick="sendToWhatsApp()" style="width:100%; padding:15px; background:#1b5e20; color:#fff; border:none; margin-top:15px; font-weight:900; cursor:pointer">FINALIZAR PEDIDO NO WHATSAPP</button>
        </div>
    </div>

    <section class="london-hero">
        <img src="logo2.png">
    </section>

    <div id="mainContent" class="section-container">
        <div id="search-result-title"></div>
        <div id="nike-sections-wrapper"></div>
        <div class="carousel-container" id="mainBanner">
            <div class="carousel-track" id="track"></div>
        </div>
        <div id="other-sections"></div>
    </div>

    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <div style="background:#f5f5f5"><img id="modalImg" style="width:100%; height:100%; object-fit:cover"></div>
            <div style="padding:30px">
                <h2 id="modalName" style="font-weight:900; margin-bottom:5px"></h2>
                <p id="modalPrice" style="font-size:1.5rem; font-weight:900; color:var(--green)"></p>
                <p style="margin-top:20px; font-weight:700">Tamanho BR:</p>
                <div class="size-selector">
                    <div class="size-btn" onclick="selectSize(this)">38</div>
                    <div class="size-btn" onclick="selectSize(this)">39</div>
                    <div class="size-btn" onclick="selectSize(this)">40</div>
                    <div class="size-btn" onclick="selectSize(this)">41</div>
                    <div class="size-btn" onclick="selectSize(this)">42</div>
                    <div class="size-btn" onclick="selectSize(this)">43</div>
                </div>
                <button onclick="confirmAddToCart()" style="width:100%; padding:18px; background:black; color:white; border:none; font-weight:900; cursor:pointer;">ADICIONAR AO CARRINHO</button>
                <p onclick="closeModal()" style="text-align:center; margin-top:15px; cursor:pointer; font-weight:700; opacity:0.6">VOLTAR</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgjv7At7-QVc6zw0_oLtTxrzSK7nY6Cug",
            authDomain: "area-037.firebaseapp.com",
            databaseURL: "https://area-037-default-rtdb.firebaseio.com",
            projectId: "area-037",
            storageBucket: "area-037.firebasestorage.app",
            messagingSenderId: "509994998279",
            appId: "1:509994998279:web:3024b345e27de5ab0aa8a2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], cart = [], selectedProduct = null, selectedSize = null;
        const fmtPrice = (val) => Number(val).toLocaleString('pt-br', {minimumFractionDigits: 2});

        db.ref("banners").on("value", snap => {
            const b = snap.val();
            if(b) document.getElementById('track').innerHTML = `<img src="${b.link1}"><img src="${b.link2}"><img src="${b.link3}">`;
        });

        let slideIdx = 0;
        setInterval(() => {
            slideIdx = (slideIdx + 1) % 3;
            const t = document.getElementById('track');
            if(t) t.style.transform = `translateX(-${slideIdx * 100}%)`;
        }, 5000);

        db.ref("produtos").on("value", snap => {
            const data = snap.val();
            allProducts = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
            renderGrid(allProducts);
        });

        function renderGrid(products, isSearch = false) {
            const nikeWrapper = document.getElementById('nike-sections-wrapper');
            const otherDiv = document.getElementById('other-sections');
            const banner = document.getElementById('mainBanner');
            const searchTitle = document.getElementById('search-result-title');

            nikeWrapper.innerHTML = '';
            otherDiv.innerHTML = '';

            if (isSearch) {
                banner.style.display = 'none';
                searchTitle.innerHTML = `<h2 class="brand-title">RESULTADOS DA BUSCA</h2>`;
                otherDiv.innerHTML = `<div class="grid">` + products.map(p => cardHtml(p)).join('') + `</div>`;
                if(products.length === 0) otherDiv.innerHTML = "<p style='text-align:center; padding:50px;'>Nenhum produto encontrado.</p>";
            } else {
                banner.style.display = 'block';
                searchTitle.innerHTML = '';

                const nikeProducts = products.filter(p => p.brand.toUpperCase() === 'NIKE');
                
                const categories = [
                    { label: 'NIKE NOCTA', key: 'NOCTA' },
                    { label: 'NIKE AIR MAX TN', key: 'TN' },
                    { label: 'NIKE AIR MAX DN', key: 'DN' },
                    { label: 'NIKE AIR FORCE', key: 'AIR FORCE' },
                    { label: 'NIKE DUNK LOW', key: 'DUNK LOW' },
                    { label: 'NIKE JORDAN LOW', key: 'JORDAN LOW' }
                ];

                categories.forEach(cat => {
                    const filtered = nikeProducts.filter(p => p.name.toUpperCase().includes(cat.key));
                    if (filtered.length > 0) {
                        nikeWrapper.innerHTML += `
                            <h2 class="brand-title">${cat.label}</h2>
                            <div class="grid">${filtered.map(p => cardHtml(p)).join('')}</div>
                        `;
                    }
                });

                const otherNike = nikeProducts.filter(p => 
                    !categories.some(cat => p.name.toUpperCase().includes(cat.key))
                );
                if (otherNike.length > 0) {
                    nikeWrapper.innerHTML += `
                        <h2 class="brand-title">OUTROS MODELOS NIKE</h2>
                        <div class="grid">${otherNike.map(p => cardHtml(p)).join('')}</div>
                    `;
                }

                const otherBrands = [...new Set(products.map(p => p.brand.toUpperCase()))].filter(b => b !== 'NIKE');
                otherBrands.forEach(brand => {
                    otherDiv.innerHTML += `<h2 class="brand-title">${brand}</h2><div class="grid">` + 
                        products.filter(p => p.brand.toUpperCase() === brand).map(p => cardHtml(p)).join('') + 
                        `</div>`;
                });
            }
        }

        function cardHtml(p) {
            return `
                <div class="p-card" onclick="openPopup('${p.id}')">
                    <img src="${p.img}" style="width:100%; aspect-ratio:1/1; object-fit:cover">
                    <div style="padding:12px">
                        <p style="font-weight:700; font-size:0.9rem">${p.name}</p>
                        <p class="p-price">R$ ${fmtPrice(p.price)}</p>
                    </div>
                </div>`;
        }

        // --- WHATSAPP FINALIZATION LOGIC ---
        window.sendToWhatsApp = () => {
            if (cart.length === 0) return alert("Seu carrinho está vazio!");

            let message = "🛍️ *NOVO PEDIDO - ÁREA 037*\n\n";
            let total = 0;

            cart.forEach((item, index) => {
                message += `*${index + 1}. ${item.name}*\n`;
                message += `📏 Tam: ${item.size}\n`;
                message += `💰 Preço: R$ ${fmtPrice(item.price)}\n\n`;
                total += Number(item.price);
            });

            message += `--------------------------\n`;
            message += `💵 *TOTAL: R$ ${fmtPrice(total)}*\n\n`;
            message += `Tenho interesse nestes produtos! Como prosseguimos?`;

            const encodedMessage = encodeURIComponent(message);
            const phone = "5537998744383";
            const whatsappUrl = `https://wa.me/${phone}?text=${encodedMessage}`;

            window.open(whatsappUrl, '_blank');
        };

        window.toggleSearch = () => {
            const bar = document.getElementById('searchBar');
            bar.classList.toggle('active');
            if(bar.classList.contains('active')) document.getElementById('searchInput').focus();
            else { document.getElementById('searchInput').value = ''; renderGrid(allProducts); }
        }

        window.realTimeSearch = () => {
            const term = document.getElementById('searchInput').value.toUpperCase();
            if(term.length > 0) {
                const filtered = allProducts.filter(p => p.name.toUpperCase().includes(term) || p.brand.toUpperCase().includes(term));
                renderGrid(filtered, true);
            } else renderGrid(allProducts, false);
        }

        window.openPopup = (id) => {
            selectedProduct = allProducts.find(p => p.id === id);
            selectedSize = null;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('modalImg').src = selectedProduct.img;
            document.getElementById('modalName').innerText = selectedProduct.name;
            document.getElementById('modalPrice').innerText = `R$ ${fmtPrice(selectedProduct.price)}`;
            document.getElementById('productModal').style.display = 'flex';
        }
        window.selectSize = (btn) => {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedSize = btn.innerText;
        }
        window.closeModal = () => document.getElementById('productModal').style.display = 'none';
        window.confirmAddToCart = () => {
            if(!selectedSize) return alert("Selecione o tamanho!");
            cart.push({...selectedProduct, size: selectedSize});
            updateCart();
            closeModal();
            toggleSidebar('cartSide');
        }
        function updateCart() {
            const container = document.getElementById('cartItems');
            document.getElementById('cartCount').innerText = cart.length;
            container.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <img src="${item.img}">
                    <div class="cart-item-info">
                        <p style="font-weight:700; font-size:0.8rem">${item.name}</p>
                        <p style="font-size:0.7rem">Tam: ${item.size}</p>
                        <p style="color:var(--green); font-weight:900">R$ ${fmtPrice(item.price)}</p>
                    </div>
                    <i class="fas fa-trash" style="cursor:pointer; color:red" onclick="removeItem(${i})"></i>
                </div>`).join('');
            const total = cart.reduce((sum, item) => sum + Number(item.price), 0);
            document.getElementById('cartTotal').innerText = `Total: R$ ${fmtPrice(total)}`;
        }
        window.removeItem = (index) => { cart.splice(index, 1); updateCart(); }
        window.toggleSidebar = (id) => document.getElementById(id).classList.toggle('active');
        window.filterBy = (brand) => {
            if(brand === 'ALL') renderGrid(allProducts);
            else renderGrid(allProducts.filter(p => p.brand.toUpperCase() === brand));
            toggleSidebar('filterSide');
            window.scrollTo({top: 500, behavior: 'smooth'});
        }
    </script>
</body>
</html>
