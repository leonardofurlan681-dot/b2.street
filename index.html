<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área 037 | Streetwear Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #000; 
            --green: #2ecc71; 
            --white: #fff; 
            --accent: #ff0000; 
            --gray: #f8f8f8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { background: var(--white); overflow-x: hidden; color: #1a1a1a; }
        
        /* HEADER REFINADO */
        header { 
            position: fixed; top: 0; width: 100%; height: 80px; 
            background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 5%; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); 
        }

        .icon-btn { font-size: 1.3rem; cursor: pointer; transition: 0.3s; position: relative; color: var(--primary); }
        .icon-btn:hover { opacity: 0.6; }

        .search-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: none; align-items: center; padding: 0 5%;
            z-index: 1100; animation: fadeIn 0.3s ease;
        }
        .search-container.active { display: flex; }
        .search-container input {
            flex: 1; border: none; outline: none; font-size: 1.2rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* HERO SECTION COM VÍDEO MP4 */
        .london-hero { 
            width: 100%; height: 70vh; margin-top: 80px;
            background: #000;
            display: flex; align-items: center; justify-content: center; position: relative;
            overflow: hidden;
        }
        .hero-video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 0;
        }
        .london-hero::after { 
            content: ''; position: absolute; inset: 0; 
            background: rgba(0,0,0,0.3); z-index: 1; 
        }
        .london-hero img { 
            width: 60%; max-width: 350px; z-index: 2; 
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5)); 
        }

        /* SIDEBARS */
        .sidebar { 
            position: fixed; top: 0; width: 320px; height: 100%; 
            background: #fff; z-index: 5000; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); 
            padding: 40px; box-shadow: 0 0 50px rgba(0,0,0,0.15); 
        }
        .sidebar h2 { font-weight: 900; letter-spacing: -1px; margin-bottom: 30px; font-size: 1.5rem; }
        
        #filterSide { left: -320px; }
        #filterSide.active { left: 0; }
        #cartSide { right: -320px; }
        #cartSide.active { right: 0; }

        .close-sidebar-x {
            position: absolute; top: 25px; right: 25px;
            font-size: 1.8rem; cursor: pointer; color: #000;
            transition: 0.3s; line-height: 1;
        }
        .close-sidebar-x:hover { transform: rotate(90deg); color: var(--accent); }

        .filter-link { 
            display: block; font-size: 1rem; font-weight: 700; 
            text-transform: uppercase; margin-bottom: 18px; 
            cursor: pointer; transition: 0.2s; color: #444;
        }
        .filter-link:hover { padding-left: 10px; color: #000; }

        /* CARDS E GRIDS */
        .brand-title { 
            font-size: 1.4rem; font-weight: 900; text-transform: uppercase; 
            margin: 60px 0 25px; border-left: 5px solid #000; padding-left: 15px; 
        }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media(min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 30px; } }
        
        .p-card { 
            background: #fff; border-radius: 15px; overflow: hidden; 
            border: 1px solid #f0f0f0; cursor: pointer; transition: 0.4s;
        }
        .p-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .p-price { color: var(--green); font-weight: 900; font-size: 1.1rem; margin-top: 5px; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 6000; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; width: 95%; max-width: 900px; border-radius: 25px; overflow: hidden; display: grid; grid-template-columns: 1.2fr 1fr; position: relative; }
        @media (max-width: 768px) { .modal-content { grid-template-columns: 1fr; height: 90vh; overflow-y: auto; } }

        .size-btn { 
            padding: 12px; border: 1px solid #eee; text-align: center; 
            cursor: pointer; font-weight: 700; border-radius: 10px; transition: 0.2s;
        }
        .size-btn.selected { background: #000; color: #fff; transform: scale(1.05); }

        .btn-finish {
            width: 100%; padding: 18px; background: #1b5e20; color: #fff; 
            border: none; margin-top: 15px; font-weight: 900; cursor: pointer;
            border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-align-left icon-btn" onclick="toggleSidebar('filterSide')"></i>
        <img src="logo.jpg" style="height:40px; cursor:pointer" onclick="window.location.reload()">
        <div style="display:flex; gap:20px">
            <i class="fas fa-search icon-btn" onclick="toggleSearch()"></i>
            <div class="icon-btn" onclick="toggleSidebar('cartSide')">
                <i class="fas fa-shopping-bag"></i>
                <span id="cartCount" style="position:absolute; top:-8px; right:-8px; background:var(--accent); color:white; font-size:0.65rem; padding:3px 6px; border-radius:50%; font-weight:900">0</span>
            </div>
        </div>
        <div class="search-container" id="searchBar">
            <input type="text" id="searchInput" placeholder="O que você procura?" oninput="realTimeSearch()">
            <i class="fas fa-times icon-btn" onclick="toggleSearch()"></i>
        </div>
    </header>

    <div id="filterSide" class="sidebar">
        <span class="close-sidebar-x" onclick="toggleSidebar('filterSide')">&times;</span>
        <h2>MARCAS</h2>
        <span class="filter-link" onclick="filterBy('NIKE')">Nike</span>
        <span class="filter-link" onclick="filterBy('ADIDAS')">Adidas</span>
        <span class="filter-link" onclick="filterBy('NEW BALANCE')">New Balance</span>
        <span class="filter-link" onclick="filterBy('PUMA')">Puma</span>
        <div style="height:1px; background:#eee; margin: 20px 0;"></div>
        <span class="filter-link" onclick="filterBy('ALL')" style="color:var(--accent)">Ver Toda Coleção</span>
    </div>

    <div id="cartSide" class="sidebar">
        <span class="close-sidebar-x" onclick="toggleSidebar('cartSide')">&times;</span>
        <h2>CARRINHO</h2>
        <div id="cartItems" style="max-height: 60vh; overflow-y: auto;"></div>
        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:20px">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <span style="font-weight:700; color:#888">SUBTOTAL</span>
                <h3 id="cartTotal">R$ 0,00</h3>
            </div>
            <button class="btn-finish" onclick="sendToWhatsApp()">
                <i class="fab fa-whatsapp"></i> FINALIZAR PEDIDO
            </button>
        </div>
    </div>

    <section class="london-hero">
        <video autoplay muted loop playsinline class="hero-video-bg">
            <source src="video.mov" type="video/mp4">
            Seu navegador não suporta vídeos.
        </video>
        <img src="logo2.png" alt="Logo Área 037">
    </section>

    <div id="mainContent" class="section-container" style="padding: 0 5% 80px;">
        <div id="search-result-title"></div>
        <div id="nike-sections-wrapper"></div>
        
        <div class="carousel-container" id="mainBanner" style="width: 100%; height: 400px; overflow: hidden; position: relative; border-radius: 25px; margin: 60px 0;">
            <div class="carousel-track" id="track" style="display: flex; transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1); height: 100%;"></div>
        </div>

        <div id="other-sections"></div>
    </div>

    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <div style="background:#f9f9f9; display:flex; align-items:center; justify-content:center">
                <img id="modalImg" style="width:100%; height:100%; object-fit:contain; padding:20px">
            </div>
            <div style="padding:40px; display:flex; flex-direction:column; justify-content:center">
                <h2 id="modalName" style="font-weight:900; font-size:1.8rem; line-height:1.1; margin-bottom:10px"></h2>
                <p id="modalPrice" style="font-size:1.6rem; font-weight:900; color:var(--green)"></p>
                
                <div style="margin:30px 0">
                    <p style="margin-bottom:15px; font-weight:700; font-size:0.9rem; letter-spacing:1px">SELECIONE O TAMANHO BR</p>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px">
                        <div class="size-btn" onclick="selectSize(this)">38</div>
                        <div class="size-btn" onclick="selectSize(this)">39</div>
                        <div class="size-btn" onclick="selectSize(this)">40</div>
                        <div class="size-btn" onclick="selectSize(this)">41</div>
                        <div class="size-btn" onclick="selectSize(this)">42</div>
                        <div class="size-btn" onclick="selectSize(this)">43</div>
                    </div>
                </div>

                <button onclick="confirmAddToCart()" style="width:100%; padding:20px; background:black; color:white; border:none; font-weight:900; cursor:pointer; border-radius:15px; letter-spacing:1px">ADICIONAR AO CARRINHO</button>
                <p onclick="closeModal()" style="text-align:center; margin-top:20px; cursor:pointer; font-weight:700; opacity:0.4; font-size:0.8rem">VOLTAR PARA LOJA</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgjv7At7-QVc6zw0_oLtTxrzSK7nY6Cug",
            authDomain: "area-037.firebaseapp.com",
            databaseURL: "https://area-037-default-rtdb.firebaseio.com",
            projectId: "area-037",
            storageBucket: "area-037.firebasestorage.app",
            messagingSenderId: "509994998279",
            appId: "1:509994998279:web:3024b345e27de5ab0aa8a2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], cart = [], selectedProduct = null, selectedSize = null;
        const fmtPrice = (val) => Number(val).toLocaleString('pt-br', {minimumFractionDigits: 2});

        db.ref("banners").on("value", snap => {
            const b = snap.val();
            if(b) document.getElementById('track').innerHTML = `<img src="${b.link1}" style="min-width:100%; object-fit:cover"><img src="${b.link2}" style="min-width:100%; object-fit:cover"><img src="${b.link3}" style="min-width:100%; object-fit:cover">`;
        });

        let slideIdx = 0;
        setInterval(() => {
            slideIdx = (slideIdx + 1) % 3;
            const t = document.getElementById('track');
            if(t) t.style.transform = `translateX(-${slideIdx * 100}%)`;
        }, 5000);

        db.ref("produtos").on("value", snap => {
            const data = snap.val();
            allProducts = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
            renderGrid(allProducts);
        });

        function renderGrid(products, isSearch = false) {
            const nikeWrapper = document.getElementById('nike-sections-wrapper');
            const otherDiv = document.getElementById('other-sections');
            const banner = document.getElementById('mainBanner');
            const searchTitle = document.getElementById('search-result-title');

            nikeWrapper.innerHTML = ''; otherDiv.innerHTML = '';

            if (isSearch) {
                banner.style.display = 'none';
                searchTitle.innerHTML = `<h2 class="brand-title">Resultados encontrados</h2>`;
                otherDiv.innerHTML = `<div class="grid">` + products.map(p => cardHtml(p)).join('') + `</div>`;
            } else {
                banner.style.display = 'block';
                searchTitle.innerHTML = '';
                const nikeProducts = products.filter(p => p.brand.toUpperCase() === 'NIKE');
                const categories = [
                    { label: 'NIKE NOCTA', key: 'NOCTA' },
                    { label: 'NIKE AIR MAX TN', key: 'TN' },
                    { label: 'NIKE AIR MAX DN', key: 'DN' },
                    { label: 'NIKE AIR FORCE', key: 'AIR FORCE' },
                    { label: 'NIKE DUNK LOW', key: 'DUNK LOW' },
                    { label: 'NIKE JORDAN', key: 'JORDAN' }
                ];

                categories.forEach(cat => {
                    const filtered = nikeProducts.filter(p => p.name.toUpperCase().includes(cat.key));
                    if (filtered.length > 0) {
                        nikeWrapper.innerHTML += `<h2 class="brand-title">${cat.label}</h2><div class="grid">${filtered.map(p => cardHtml(p)).join('')}</div>`;
                    }
                });

                const otherBrands = [...new Set(products.map(p => p.brand.toUpperCase()))].filter(b => b !== 'NIKE');
                otherBrands.forEach(brand => {
                    otherDiv.innerHTML += `<h2 class="brand-title">${brand}</h2><div class="grid">` + 
                        products.filter(p => p.brand.toUpperCase() === brand).map(p => cardHtml(p)).join('') + `</div>`;
                });
            }
        }

        function cardHtml(p) {
            return `
                <div class="p-card" onclick="openPopup('${p.id}')">
                    <img src="${p.img}" style="width:100%; aspect-ratio:1/1; object-fit:cover">
                    <div style="padding:15px">
                        <p style="font-weight:700; font-size:0.85rem; color:#888; margin-bottom:4px">${p.brand}</p>
                        <p style="font-weight:700; font-size:0.95rem; height:40px; overflow:hidden">${p.name}</p>
                        <p class="p-price">R$ ${fmtPrice(p.price)}</p>
                    </div>
                </div>`;
        }

        window.toggleSidebar = (id) => document.getElementById(id).classList.toggle('active');
        window.toggleSearch = () => {
            const bar = document.getElementById('searchBar');
            bar.classList.toggle('active');
            if(bar.classList.contains('active')) document.getElementById('searchInput').focus();
        };

        window.openPopup = (id) => {
            selectedProduct = allProducts.find(p => p.id === id);
            selectedSize = null;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('modalImg').src = selectedProduct.img;
            document.getElementById('modalName').innerText = selectedProduct.name;
            document.getElementById('modalPrice').innerText = `R$ ${fmtPrice(selectedProduct.price)}`;
            document.getElementById('productModal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('productModal').style.display = 'none';

        window.selectSize = (btn) => {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedSize = btn.innerText;
        };

        window.confirmAddToCart = () => {
            if(!selectedSize) return alert("Por favor, selecione um tamanho.");
            cart.push({...selectedProduct, size: selectedSize});
            updateCart();
            closeModal();
            toggleSidebar('cartSide');
        };

        function updateCart() {
            const container = document.getElementById('cartItems');
            document.getElementById('cartCount').innerText = cart.length;
            container.innerHTML = cart.map((item, i) => `
                <div style="display:flex; gap:15px; margin-bottom:20px; align-items:center">
                    <img src="${item.img}" style="width:70px; height:70px; object-fit:cover; border-radius:12px">
                    <div style="flex:1">
                        <p style="font-weight:700; font-size:0.85rem">${item.name}</p>
                        <p style="font-size:0.75rem; color:#888">Tamanho: ${item.size}</p>
                        <p style="font-weight:900">R$ ${fmtPrice(item.price)}</p>
                    </div>
                    <i class="fas fa-times" style="cursor:pointer; color:#ddd" onclick="removeItem(${i})"></i>
                </div>`).join('');
            const total = cart.reduce((sum, item) => sum + Number(item.price), 0);
            document.getElementById('cartTotal').innerText = `R$ ${fmtPrice(total)}`;
        }

        window.removeItem = (index) => { cart.splice(index, 1); updateCart(); };

        window.realTimeSearch = () => {
            const term = document.getElementById('searchInput').value.toUpperCase();
            if(term.length > 0) {
                const filtered = allProducts.filter(p => p.name.toUpperCase().includes(term) || p.brand.toUpperCase().includes(term));
                renderGrid(filtered, true);
            } else renderGrid(allProducts, false);
        };

        window.filterBy = (brand) => {
            if(brand === 'ALL') renderGrid(allProducts);
            else renderGrid(allProducts.filter(p => p.brand.toUpperCase() === brand));
            toggleSidebar('filterSide');
        };

        window.sendToWhatsApp = () => {
            if (cart.length === 0) return alert("Carrinho vazio!");
            let msg = "🔥 *NOVO PEDIDO - ÁREA 037*\n\n";
            cart.forEach(item => msg += `▪️ ${item.name} (Tam: ${item.size}) - R$ ${fmtPrice(item.price)}\n`);
            msg += `\n💰 *TOTAL: ${document.getElementById('cartTotal').innerText}*`;
            window.open(`https://wa.me/5537998744383?text=${encodeURIComponent(msg)}`);
        };
    </script>
</body>
</html>
